version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: loanmaker-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-loan_maker}
      MYSQL_USER: ${MYSQL_USER:-loanmaker}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=128M
      --max-connections=20
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: loanmaker-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    command: >
      --storage-type=rocksdb
      --wal-log=off
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/collections"]
      interval: 10s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loanmaker-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-loan_maker}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_ROOT_USER:-root}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JAVA_OPTS: "-Xmx256m -Xms128m"
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  ai-service:
    build:
      context: ./AI/loanmaker-ai
      dockerfile: Dockerfile
    container_name: loanmaker-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_ROOT_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DB: ${MYSQL_DATABASE:-loan_maker}
      # Use API-based LLM keys here to avoid memory issues
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_healthy

volumes:
  mysql_data:
  qdrant_storage: