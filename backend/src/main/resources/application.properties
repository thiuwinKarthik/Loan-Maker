spring.application.name=loan-maker-backend

# ==========================
# Database Configuration
# ==========================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/loan_maker}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Optional: Hibernate config
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ==========================
# Server Port
# ==========================
server.port=${PORT:8080}

# JWT Secret
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

ai.service.base-url=${AI_SERVICE_BASE_URL:http://127.0.0.1:8000}
ai.service.timeout-ms=${AI_SERVICE_TIMEOUT_MS:5000}
rag.max-requests-per-minute=${RAG_MAX_REQUESTS_PER_MINUTE:20}
